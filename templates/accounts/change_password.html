{% extends 'base.html' %}
{% block title %}Смена пароля{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-info text-white text-center">
                <h4>🔑 Смена пароля</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-info w-100 mt-3">Сменить пароль</button>
                </form>
            </div>
            <div class="card-footer text-center">
                <a href="{% url 'accounts:profile' %}" class="btn btn-secondary">← Назад в профиль</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
